<!DOCTYPE html>
<html>
<head>
<title>Transaction History</title>
</head>

<body>

<h1>Transaction History</h1>

<table border="1">

<tr>
<th>Type</th>
<th>Amount</th>
<th>Time</th>
</tr>

{% for t in history %}

<tr>
<td>{{ t.type }}</td>
<td>${{ "%.2f"|format(t.amount) }}</td>
<td>{{ t.timestamp }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">Back to Home</a>

</body>
</html>
